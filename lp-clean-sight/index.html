<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lp-clean-sight</title>
  <style>
    :root {
      --bg: #0f1117;
      --text: #e8eaef;
      --muted: #8b92a8;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #6ee7c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1.25rem 3rem;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .lead {
      font-size: 0.875rem;
      color: var(--muted);
      margin: 0 0 1.75rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    a {
      display: block;
      padding: 0.85rem 1rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover {
      border-color: rgba(110, 231, 197, 0.35);
      background: rgba(110, 231, 197, 0.06);
    }
    a strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }
    a span {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: normal;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>lp-clean-sight</h1>
    <p class="lead">静的ページ・ツールをこのリポジトリ直下に並べて置いています。</p>
    <ul>
      <li>
        <a href="./katsuya-taskboard/index.html">
          <strong>Katsuya Board</strong>
          <span>タスクボード（ローカル保存）</span>
        </a>
      </li>
    </ul>
    <footer>追加したらこの一覧にリンクを足してください。</footer>
  </div>
</body>
</html>
