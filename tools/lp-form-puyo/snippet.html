<!--
  LP オプトインフォーム（ぷよぷよボタン）— コピー用スニペット
  1. <head> で lp-form-puyo.css を読み込む（パスは LP からの相対で調整）
  2. action / name / 画像パスを差し替え
  3. MyASP 等のリファラ hidden が必要なら js/referer.js パターンを tools/lp3 を参照
-->
<div class="lp-form-puyo-kit">
  <section class="lpfp-section">
    <h3 class="lpfp-heading">
      <!-- 見出し画像がある場合 -->
      <img src="./images/hd_sk.png" alt="今すぐ登録する" />
    </h3>
    <form class="lpfp-inner" method="post" action="https://example.com/p/r/XXXX">
      <input type="hidden" name="_method" value="POST" />
      <input
        class="lpfp-input"
        type="email"
        name="data[User][mail]"
        placeholder="メールアドレスを入力してください"
        autocomplete="email"
        inputmode="email"
      />
      <span class="lpfp-btn-shell">
        <input
          class="lpfp-btn"
          type="image"
          src="./images/button.png"
          alt="送信する"
          name="regist"
        />
      </span>
      <div class="lpfp-optin">
        <p>
          メール登録をすると無料で参加できるご案内、ならびに有料講座のご案内がございます。以上ご確認の上ご登録くださいませ。
        </p>
      </div>
      <!-- リファラ送信用（フォームツールの仕様に合わせて class 名を変更） -->
      <input type="hidden" name="data[User][referer_form_url]" value="" class="UserRefererFormUrl" />
      <input type="hidden" name="data[User][referer_url]" value="" class="UserRefererUrl" />
    </form>
  </section>
</div>
