<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="複数口座の入出金と残高を、日ごとにメモ感覚で残すツール。データはこのブラウザにだけ保存されます。" />
  <title>お金のきろく · tools</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>お金のきろく</h1>
    <p class="sub">口座がいくつあっても、月ごとのカレンダーにぽちぽち書いていくだけ。「＋行」で1日に何件でも。右端はぜんぶ合わせた残高。データはこのブラウザだけに保存</p>
  </header>

  <div class="toolbar" role="toolbar" aria-label="操作">
    <div class="theme-tabs" role="tablist" aria-label="色の切り替え">
      <button type="button" class="theme-tab" id="theme-tab-auto" role="tab" aria-selected="true">自動</button>
      <button type="button" class="theme-tab" id="theme-tab-day" role="tab" aria-selected="false">昼</button>
      <button type="button" class="theme-tab" id="theme-tab-night" role="tab" aria-selected="false">夜</button>
    </div>
    <span class="toolbar-sep" aria-hidden="true"></span>
    <label>
      対象月
      <input type="month" id="month-input" />
    </label>
    <button type="button" class="btn" id="btn-prev" title="前月">◀ 前月</button>
    <button type="button" class="btn" id="btn-next" title="翌月">翌月 ▶</button>
    <button type="button" class="btn ghost" id="btn-today">今月</button>
    <button type="button" class="btn primary" id="btn-carry" title="前月の末日残高を月初にコピー">前月から繰越</button>
    <button type="button" class="btn" id="btn-accounts">口座名の編集</button>
    <button type="button" class="btn ghost" id="btn-export">データをファイルに保存</button>
    <button type="button" class="btn ghost" id="btn-import">ファイルから読み込み</button>
    <input type="file" id="import-file" accept="application/json" hidden />
  </div>

  <div class="table-wrap">
    <table class="ledger" id="ledger-table" aria-label="お金のきろくの一覧">
      <thead id="ledger-head"></thead>
      <tbody id="ledger-body"></tbody>
    </table>
  </div>

  <section class="summary" aria-label="月間サマリー">
    <h2>この月の合計</h2>
    <div class="summary-grid" id="summary-grid"></div>
  </section>

  <p class="note-block">
    同じ日に何件も書きたいときは、日付の「＋行」。けしてよいのは一番下の行だけ（「−行」）。右の「合計」は、その行までの全口座の残高を足した数字です。
    税金や保険の細かい表は、「項目」に一言メモするか、別の紙でもOKです。
  </p>

  <dialog class="modal" id="dlg-accounts">
    <div class="modal-inner">
      <h2>口座名（最大8件）</h2>
      <ul class="account-edit-list" id="account-edit-list"></ul>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="dlg-cancel">キャンセル</button>
        <button type="button" class="btn primary" id="dlg-save">保存</button>
      </div>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
