<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>katsuya-repository</title>
  <style>
    :root { --bg: #0f1117; --text: #e8eaef; --muted: #8b92a8; --line: rgba(255,255,255,.1); --accent: #6ee7c5; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem 1.25rem; line-height: 1.6; }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
    p.lead { color: var(--muted); font-size: 0.875rem; margin: 0 0 1.5rem; }
    ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.65rem; }
    a {
      display: block; padding: 0.85rem 1rem; border: 1px solid var(--line); border-radius: 10px;
      color: var(--text); text-decoration: none; transition: border-color .15s, background .15s;
    }
    a:hover { border-color: rgba(110,231,197,.35); background: rgba(110,231,197,.06); }
    a strong { display: block; font-size: 0.95rem; margin-bottom: 0.2rem; }
    a span { font-size: 0.78rem; color: var(--muted); font-weight: normal; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>katsuya-repository</h1>
    <p class="lead">GitHub Pages 用の入口（リポジトリ直下）。</p>
    <ul>
      <li>
        <a href="./tools/katsuya-taskboard/index.html">
          <strong>Katsuya Board</strong>
          <span>タスクボード</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
